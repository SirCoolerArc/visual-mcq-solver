# GNR 638 — Practice MCQ bank (50 questions)
#
# Schema (per question):
#   id:         stable string, becomes filename stem
#   topic:      cnn | loss_opt | gan | vae | rnn | autoencoder | misc
#   subtopic:   free-form
#   difficulty: easy | moderate | hard
#   title:      short LaTeX title (rendered in \section*{Ques: ...})
#   body:       LaTeX source for the question body
#   options:    dict A/B/C/D, each {prose|math|code}: "..."
#   correct:    A | B | C | D
#   source:     "authored" | "adapted:<origin>" | "mirror:<sample>"
#   notes:      optional; not rendered
#
# Allocation (8 easy / 27 moderate / 15 hard):
#   CNN:10 | Losses/Opt:10 | GAN:8 | VAE:8 | RNN:6 | Autoencoder:4 | Misc:4

questions:

  # ==================================================================
  #                        CNN ARITHMETIC (10)
  # ==================================================================

  - id: cnn_padding_same_01
    topic: cnn
    subtopic: shape
    difficulty: easy
    title: "Padding for Shape Preservation"
    body: |
      For a 2D convolution layer with kernel size $k$ (odd) and stride 1,
      what padding $p$ preserves the spatial size of the input?
    options:
      A: {math: "p = 0"}
      B: {math: "p = k"}
      C: {math: "p = \\tfrac{k-1}{2}"}
      D: {math: "p = 2k"}
    correct: C
    source: authored

  - id: cnn_param_count_01
    topic: cnn
    subtopic: parameter_count
    difficulty: easy
    title: "Conv Parameter Count"
    body: |
      A 2D convolution layer has 32 input channels, 64 output channels, a $3 \times 3$
      kernel, and uses bias. How many trainable parameters does it have?
    options:
      A: {math: "18{,}432"}
      B: {math: "18{,}496"}
      C: {math: "1{,}792"}
      D: {math: "576"}
    correct: B
    source: authored
    notes: "3*3*32*64 = 18432 weights + 64 biases = 18496."

  - id: cnn_shape_01
    topic: cnn
    subtopic: shape_propagation
    difficulty: moderate
    title: "CNN Shape Propagation"
    body: |
      An input image of size $64 \times 64$ is passed through the following sequence:
      \begin{itemize}
          \item a convolution layer with kernel size $3 \times 3$, stride 2, and padding 1
          \item followed by max-pooling with kernel size 2
      \end{itemize}
      What is the final spatial size of the output?
    options:
      A: {math: "16 \\times 16"}
      B: {math: "32 \\times 32"}
      C: {math: "8 \\times 8"}
      D: {math: "64 \\times 64"}
    correct: A
    source: "mirror:sample_image_2"
    notes: "Conv: (64-3+2)/2+1 = 32. Pool: 32/2 = 16."

  - id: cnn_shape_stack_01
    topic: cnn
    subtopic: shape_propagation
    difficulty: moderate
    title: "Stacked Layer Shape"
    body: |
      A $32 \times 32$ input is passed through:
      \[
        \text{Conv}(5\times5,\ s{=}1,\ p{=}2)
        \to \text{MaxPool}(2\times2,\ s{=}2)
        \to \text{Conv}(3\times3,\ s{=}2,\ p{=}1).
      \]
      What is the final spatial size?
    options:
      A: {math: "8 \\times 8"}
      B: {math: "16 \\times 16"}
      C: {math: "7 \\times 7"}
      D: {math: "4 \\times 4"}
    correct: A
    source: "adapted:Tutorials.Q1"
    notes: "32 -> 32 (conv p=2) -> 16 (pool) -> 8 (conv s=2 p=1: (16-3+2)/2+1=8)."

  - id: cnn_receptive_field_01
    topic: cnn
    subtopic: receptive_field
    difficulty: moderate
    title: "Stacked Receptive Field"
    body: |
      Two $3 \times 3$ convolution layers with stride 1 and dilation 1 are stacked.
      What is the receptive field (on the input) of a single activation in the output
      of the second layer?
    options:
      A: {math: "3 \\times 3"}
      B: {math: "5 \\times 5"}
      C: {math: "6 \\times 6"}
      D: {math: "9 \\times 9"}
    correct: B
    source: authored
    notes: "RF: 3 after first layer; 3 + (3-1) = 5 after second."

  - id: cnn_depthwise_separable_01
    topic: cnn
    subtopic: parameter_count
    difficulty: moderate
    title: "Depthwise-Separable Conv"
    body: |
      A standard convolution takes a $32 \times 32 \times 64$ input and produces 128
      output channels using a $3 \times 3$ kernel (no bias). Compared to a
      depthwise-separable convolution (depthwise $3\times 3$ followed by pointwise
      $1\times 1$) with the same input and output channels, the standard convolution has
      approximately:
    options:
      A: {prose: "2x more parameters"}
      B: {prose: "4x more parameters"}
      C: {prose: "8x more parameters"}
      D: {prose: "16x more parameters"}
    correct: C
    source: "adapted:Tutorials.Q3"
    notes: "Standard: 3*3*64*128=73728. DW-sep: 3*3*64 + 1*1*64*128 = 576+8192 = 8768. Ratio ≈ 8.4."

  - id: cnn_transposed_conv_01
    topic: cnn
    subtopic: shape_propagation
    difficulty: moderate
    title: "Transposed Convolution Output"
    body: |
      A transposed convolution takes a $7 \times 7$ input with a $4 \times 4$ kernel,
      stride 2, and padding 1 (using the standard formula
      $H_{\text{out}} = (H_{\text{in}}-1)\cdot s - 2p + k$). What is the output spatial
      size?
    options:
      A: {math: "12 \\times 12"}
      B: {math: "14 \\times 14"}
      C: {math: "16 \\times 16"}
      D: {math: "13 \\times 13"}
    correct: B
    source: authored
    notes: "(7-1)*2 - 2 + 4 = 14."

  - id: cnn_dilation_rf_01
    topic: cnn
    subtopic: receptive_field
    difficulty: hard
    title: "Dilated Receptive Field"
    body: |
      Two $3 \times 3$ convolution layers are stacked with stride 1. The first has
      dilation 1, the second has dilation 2. What is the receptive field of one
      activation in the output of the second layer?
    options:
      A: {math: "5 \\times 5"}
      B: {math: "7 \\times 7"}
      C: {math: "9 \\times 9"}
      D: {math: "11 \\times 11"}
    correct: B
    source: "adapted:Tutorials.Q4"
    notes: "Layer 1 RF = 3; layer 2 effective kernel with d=2 is 5; RF = 3 + (5-1) = 7."

  - id: cnn_flops_01
    topic: cnn
    subtopic: flops
    difficulty: hard
    title: "Convolution MACs"
    body: |
      A convolution layer with 64 input channels, 128 output channels, a $3 \times 3$
      kernel, stride 1, and padding 1 is applied to a $56 \times 56$ feature map.
      Approximately how many multiply-accumulate operations (MACs) does one forward
      pass use? (Ignore the bias.)
    options:
      A: {math: "58 \\text{ M}"}
      B: {math: "115 \\text{ M}"}
      C: {math: "231 \\text{ M}"}
      D: {math: "460 \\text{ M}"}
    correct: C
    source: authored
    notes: "MACs/output pixel = 3*3*64 = 576; output pixels = 56*56*128 = 401408; total ≈ 231M."

  - id: cnn_1x1_purpose_01
    topic: cnn
    subtopic: layer_semantics
    difficulty: hard
    title: "Role of 1x1 Convolution"
    body: |
      A $1 \times 1$ convolution is applied to a $C_{\text{in}}$-channel feature map
      of spatial size $H \times W$, producing $C_{\text{out}}$ channels. Which
      statement best describes what this operation does?
    options:
      A: {prose: "It mixes spatial information across neighboring pixels."}
      B: {prose: "It applies a per-pixel linear transformation across channels (i.e., a channel-wise linear combination at each spatial location)."}
      C: {prose: "It reduces the spatial size by a factor of 2."}
      D: {prose: "It is equivalent to a $3\\times 3$ convolution with the same parameter count."}
    correct: B
    source: authored

  # ==================================================================
  #                   LOSSES / ACTIVATIONS / OPTIMIZERS (10)
  # ==================================================================

  - id: loss_bce_basic_01
    topic: loss_opt
    subtopic: loss_selection
    difficulty: easy
    title: "Loss for Binary Classification"
    body: |
      For a standard binary classification problem where the model outputs a single
      probability $p = \sigma(z) \in (0,1)$ and the target $y \in \{0,1\}$, which of
      the following is the standard loss function?
    options:
      A: {prose: "Mean squared error, $L = (p - y)^2$"}
      B: {prose: "Binary cross-entropy, $L = -\\bigl[y \\log p + (1-y) \\log(1-p)\\bigr]$"}
      C: {prose: "Hinge loss, $L = \\max(0,\\ 1 - y \\cdot p)$"}
      D: {prose: "KL divergence between $p$ and a uniform distribution"}
    correct: B
    source: authored

  - id: activation_dying_relu_01
    topic: loss_opt
    subtopic: activations
    difficulty: easy
    title: "Dying ReLU"
    body: |
      The "dying ReLU" problem refers to which failure mode?
    options:
      A: {prose: "ReLU outputs becoming unbounded during training"}
      B: {prose: "Neurons receiving persistently negative pre-activations, outputting 0 with zero gradient indefinitely"}
      C: {prose: "ReLU being non-differentiable at the origin"}
      D: {prose: "ReLU saturating for large positive inputs"}
    correct: B
    source: authored

  - id: loss_focal_01
    topic: loss_opt
    subtopic: focal_loss
    difficulty: moderate
    title: "Focal Loss Role of Gamma"
    body: |
      For binary classification with target $y=1$, the focal loss is
      \[
        L = -\alpha \,(1 - p)^\gamma \,\log p, \qquad p = \sigma(z).
      \]
      What is the primary effect of setting $\gamma > 0$?
    options:
      A: {prose: "It increases the loss weight on easy, well-classified examples."}
      B: {prose: "It down-weights easy examples and concentrates the loss on hard, misclassified ones."}
      C: {prose: "It removes the need for class balancing entirely."}
      D: {prose: "It makes the loss equivalent to cross-entropy when $p = 0.5$."}
    correct: B
    source: "adapted:Tutorials.Q22"

  - id: loss_label_smoothing_01
    topic: loss_opt
    subtopic: label_smoothing
    difficulty: moderate
    title: "Label-Smoothed Target"
    body: |
      Label smoothing with $\varepsilon = 0.1$ is applied to a $K = 5$-class
      classification problem, using the smoothed target
      $y^{(ls)} = (1 - \varepsilon)\,e_y + \tfrac{\varepsilon}{K}\mathbf{1}$.
      What smoothed probability is assigned to the true class?
    options:
      A: {math: "0.90"}
      B: {math: "0.92"}
      C: {math: "0.98"}
      D: {math: "1.00"}
    correct: B
    source: "adapted:Tutorials.Q21"

  - id: loss_softmax_temperature_01
    topic: loss_opt
    subtopic: temperature_scaling
    difficulty: moderate
    title: "Temperature-Scaled Softmax"
    body: |
      A 3-class model produces logits $z = (2,\ 1,\ 0)$. With temperature $T = 2$,
      the scaled probabilities are $\mathrm{softmax}(z/T)$. What is the approximate
      probability assigned to the first class (logit 2)?
    options:
      A: {math: "0.44"}
      B: {math: "0.51"}
      C: {math: "0.59"}
      D: {math: "0.66"}
    correct: B
    source: "adapted:Tutorials.Q27"
    notes: "z/T = (1, 0.5, 0); exp ≈ (2.718, 1.649, 1); softmax[0] ≈ 2.718/5.367 ≈ 0.506."

  - id: loss_mse_vs_ce_01
    topic: loss_opt
    subtopic: loss_selection
    difficulty: moderate
    title: "Why Cross-Entropy over MSE"
    body: |
      For multi-class classification with a softmax output layer, cross-entropy is
      preferred over mean squared error primarily because:
    options:
      A: {prose: "MSE is mathematically ill-defined for probability outputs."}
      B: {prose: "MSE gradients shrink to near-zero for confidently wrong predictions, while cross-entropy gradients remain large."}
      C: {prose: "Cross-entropy is always bounded whereas MSE can diverge."}
      D: {prose: "MSE requires one-hot targets while cross-entropy does not."}
    correct: B
    source: authored

  - id: opt_adam_first_moment_01
    topic: loss_opt
    subtopic: adam
    difficulty: moderate
    title: "Adam First-Moment Update"
    body: |
      In Adam with $\beta_1 = 0.9$, if the previous first-moment estimate is
      $m_{t-1} = 0$ and the current gradient is $g_t = 0.5$, the updated (raw,
      pre-bias-correction) first moment $m_t$ is:
    options:
      A: {math: "0.05"}
      B: {math: "0.45"}
      C: {math: "0.50"}
      D: {math: "0.005"}
    correct: A
    source: "adapted:Tutorials.Q23"
    notes: "m_t = 0.9*0 + 0.1*0.5 = 0.05."

  - id: opt_momentum_velocity_01
    topic: loss_opt
    subtopic: momentum
    difficulty: moderate
    title: "Momentum Velocity Update"
    body: |
      SGD with momentum uses $v_t = \mu v_{t-1} + g_t$, $w_t = w_{t-1} - \eta v_t$.
      With $\mu = 0.9$, $v_0 = 0$, and successive gradients $g_1 = 2$, $g_2 = 3$,
      the velocity $v_2$ is:
    options:
      A: {math: "3.0"}
      B: {math: "4.8"}
      C: {math: "5.0"}
      D: {math: "2.7"}
    correct: B
    source: "adapted:Tutorials.Q24"
    notes: "v_1 = 0.9*0 + 2 = 2; v_2 = 0.9*2 + 3 = 4.8."

  - id: opt_weight_decay_adamw_01
    topic: loss_opt
    subtopic: weight_decay
    difficulty: hard
    title: "AdamW vs L2 in Adam"
    body: |
      Decoupled weight decay (as in AdamW) differs from naive $L_2$ regularization
      applied inside Adam because:
    options:
      A: {prose: "Decoupled weight decay is applied \\emph{before} gradient rescaling, while $L_2$ adds to the gradient \\emph{after} rescaling."}
      B: {prose: "Naive $L_2$ inside Adam gets divided by Adam's per-parameter adaptive denominator, which couples the regularization strength to each parameter's gradient history; decoupled weight decay avoids this."}
      C: {prose: "For plain SGD the two formulations give identical updates, but for adaptive methods like Adam they diverge."}
      D: {prose: "Both B and C are correct."}
    correct: D
    source: "adapted:Tutorials.Q25"

  - id: loss_ce_gradient_logits_01
    topic: loss_opt
    subtopic: cross_entropy
    difficulty: hard
    title: "Cross-Entropy Gradient w.r.t. Logits"
    body: |
      For softmax outputs $p_i = \mathrm{softmax}(z)_i$ and cross-entropy loss
      $L = -\log p_c$ with true class $c$, the gradient $\partial L / \partial z_i$
      equals:
    options:
      A: {math: "p_i - \\mathbf{1}[i = c]"}
      B: {math: "\\mathbf{1}[i = c] - p_i"}
      C: {math: "z_i - \\mathbf{1}[i = c]"}
      D: {math: "p_i\\,(1 - p_i)\\,\\mathbf{1}[i = c]"}
    correct: A
    source: authored

  # ==================================================================
  #                          GAN (8)
  # ==================================================================

  - id: gan_vs_vae_01
    topic: gan
    subtopic: comparison
    difficulty: easy
    title: "GAN vs VAE"
    body: |
      Which statement best contrasts GANs and VAEs?
    options:
      A: {prose: "VAEs optimize an explicit likelihood lower bound, while GANs learn implicitly through adversarial distribution matching."}
      B: {prose: "GANs require an encoder while VAEs do not."}
      C: {prose: "VAEs cannot sample new data."}
      D: {prose: "GANs always provide exact likelihoods."}
    correct: A
    source: "adapted:Quiz4.Q2"

  - id: gan_optimal_discriminator_01
    topic: gan
    subtopic: gan_theory
    difficulty: moderate
    title: "Optimal Discriminator"
    body: |
      For the standard GAN minimax objective
      \[
        \min_G \max_D \ \mathbb{E}_{x \sim p_{\text{data}}}[\log D(x)]
        + \mathbb{E}_{z \sim p_z}[\log(1 - D(G(z)))],
      \]
      the optimal discriminator for a fixed generator $G$ is:
    options:
      A: {math: "D^*(x) = \\dfrac{p_g(x)}{p_{\\text{data}}(x) + p_g(x)}"}
      B: {math: "D^*(x) = \\dfrac{p_{\\text{data}}(x)}{p_g(x)}"}
      C: {math: "D^*(x) = \\dfrac{p_{\\text{data}}(x)}{p_{\\text{data}}(x) + p_g(x)}"}
      D: {math: "D^*(x) = \\dfrac{p_g(x)}{p_{\\text{data}}(x)}"}
    correct: C
    source: "adapted:Quiz4.Q6"

  - id: gan_mode_collapse_01
    topic: gan
    subtopic: failure_modes
    difficulty: moderate
    title: "Mode Collapse"
    body: |
      Mode collapse in GANs refers to which failure mode?
    options:
      A: {prose: "The discriminator perfectly separates real and fake samples."}
      B: {prose: "The generator maps many latent codes to a limited subset of output modes, failing to cover the full data distribution."}
      C: {prose: "The generator exactly recovers every mode of the data distribution."}
      D: {prose: "The loss oscillates between very high and very low values."}
    correct: B
    source: "adapted:Quiz4.Q11"

  - id: gan_wgan_lipschitz_01
    topic: gan
    subtopic: wgan
    difficulty: moderate
    title: "WGAN Lipschitz Constraint"
    body: |
      In Wasserstein GAN, the Kantorovich-Rubinstein dual form
      \[
        W(p_{\text{data}}, p_g) \;=\;
        \sup_{\|f\|_L \leq 1}\ \mathbb{E}_{x \sim p_{\text{data}}}[f(x)]
        - \mathbb{E}_{x \sim p_g}[f(x)]
      \]
      requires the critic $f$ to be constrained to be:
    options:
      A: {prose: "1-Lipschitz"}
      B: {prose: "Convex"}
      C: {prose: "Gaussian"}
      D: {prose: "Bounded in $[0,1]$"}
    correct: A
    source: "adapted:Quiz4.Q13"

  - id: gan_non_saturating_01
    topic: gan
    subtopic: generator_loss
    difficulty: moderate
    title: "Non-Saturating Generator Loss"
    body: |
      The non-saturating generator loss $L_G = -\mathbb{E}_z[\log D(G(z))]$ is
      preferred over the minimax form $\log(1 - D(G(z)))$ primarily because:
    options:
      A: {prose: "It guarantees global convergence of GAN training."}
      B: {prose: "It provides strong gradients when $D(G(z))$ is near 0 (i.e., early in training when the generator is weak)."}
      C: {prose: "It removes the need for a discriminator."}
      D: {prose: "It directly minimizes the Wasserstein distance."}
    correct: B
    source: "adapted:Quiz4.Q10"

  - id: gan_js_optimum_01
    topic: gan
    subtopic: gan_theory
    difficulty: hard
    title: "GAN Global Optimum"
    body: |
      Substituting the optimal discriminator $D^*$ back into the original GAN
      value function gives
      \[
        V(D^*, G) \;=\; -\log 4 \;+\; 2\,\mathrm{JS}(p_{\text{data}} \,\|\, p_g).
      \]
      Which statement is most accurate?
    options:
      A: {prose: "The global optimum is achieved when $p_{\\text{data}} = p_g$, at which $V = -\\log 4$."}
      B: {prose: "The global optimum requires disjoint support between $p_{\\text{data}}$ and $p_g$."}
      C: {prose: "$V$ diverges to $+\\infty$ when the two distributions coincide."}
      D: {prose: "The Jensen-Shannon divergence is maximized at the optimum."}
    correct: A
    source: "adapted:Tutorials.Q10"

  - id: gan_disjoint_support_01
    topic: gan
    subtopic: training_dynamics
    difficulty: hard
    title: "Disjoint-Support Failure"
    body: |
      Early in GAN training $p_{\text{data}}$ and $p_g$ typically have nearly disjoint
      supports. In the original (JS-based) GAN, this causes:
    options:
      A: {prose: "Zero JS divergence and hence zero generator gradient."}
      B: {prose: "The optimal discriminator to classify perfectly, saturating JS at $\\log 2$ and producing vanishing gradients for the generator."}
      C: {prose: "An infinite Wasserstein distance with strong generator gradients."}
      D: {prose: "The discriminator to become maximally uncertain."}
    correct: B
    source: "adapted:Quiz4.Q3"

  - id: gan_wgan_gp_penalty_01
    topic: gan
    subtopic: wgan_gp
    difficulty: hard
    title: "WGAN-GP Penalty Value"
    body: |
      The WGAN-GP gradient penalty is $\lambda\,(\|\nabla_{\hat x} f(\hat x)\|_2 - 1)^2$
      with $\lambda = 10$. For one interpolated sample with gradient norm 1.5, the
      penalty contribution is:
    options:
      A: {math: "0.25"}
      B: {math: "2.5"}
      C: {math: "5.0"}
      D: {math: "10"}
    correct: B
    source: "adapted:Tutorials.Q12"
    notes: "(1.5-1)^2 * 10 = 0.25 * 10 = 2.5."

  # ==================================================================
  #                          VAE (8)
  # ==================================================================

  - id: vae_elbo_decomposition_01
    topic: vae
    subtopic: elbo
    difficulty: moderate
    title: "ELBO Two Terms"
    body: |
      The VAE evidence lower bound is
      \[
        \mathcal{L}(x)
        = \mathbb{E}_{q_\phi(z|x)}[\log p_\theta(x|z)]
        \;-\; D_{KL}(q_\phi(z|x) \,\|\, p(z)).
      \]
      The two terms correspond, respectively, to:
    options:
      A: {prose: "Reconstruction quality; regularization of the posterior toward the prior."}
      B: {prose: "Regularization toward the prior; reconstruction quality."}
      C: {prose: "Prior entropy; decoder output."}
      D: {prose: "Decoder output; encoder entropy."}
    correct: A
    source: authored

  - id: vae_reparameterization_01
    topic: vae
    subtopic: reparameterization
    difficulty: moderate
    title: "Reparameterization Trick"
    body: |
      The reparameterization trick rewrites $z \sim q_\phi(z|x) = \mathcal{N}(\mu, \sigma^2)$
      as $z = \mu + \sigma \cdot \varepsilon$ with $\varepsilon \sim \mathcal{N}(0, 1)$.
      Its main purpose is to:
    options:
      A: {prose: "Make the latent variable deterministic."}
      B: {prose: "Remove the KL term from the ELBO."}
      C: {prose: "Allow gradients to flow through the stochastic sampling step back to $\\phi$."}
      D: {prose: "Guarantee that $q_\\phi(z|x) = p(z)$ exactly."}
    correct: C
    source: "adapted:Quiz4.Q9"

  - id: vae_kl_closed_form_01
    topic: vae
    subtopic: kl_divergence
    difficulty: moderate
    title: "KL Closed Form (Per Dim)"
    body: |
      For $q_\phi(z|x) = \mathcal{N}(\mu, \mathrm{diag}(\sigma^2))$ and prior
      $p(z) = \mathcal{N}(0, I)$, the per-dimension KL divergence
      $D_{KL}(q_\phi \,\|\, p)$ equals:
    options:
      A: {math: "\\tfrac{1}{2}\\bigl(\\mu^2 + \\sigma^2 - \\log \\sigma^2 - 1\\bigr)"}
      B: {math: "\\tfrac{1}{2}\\bigl(\\mu^2 + \\log \\sigma^2 - \\sigma^2 - 1\\bigr)"}
      C: {math: "\\tfrac{1}{2}\\bigl(\\sigma^2 - \\mu^2\\bigr)"}
      D: {math: "\\mu^2 + \\sigma^2"}
    correct: A
    source: "adapted:Quiz4.Q1"

  - id: vae_posterior_collapse_01
    topic: vae
    subtopic: failure_modes
    difficulty: moderate
    title: "Posterior Collapse"
    body: |
      If the decoder in a VAE is extremely expressive, posterior collapse may occur.
      This means:
    options:
      A: {prose: "The decoder variance becomes exactly zero."}
      B: {prose: "The ELBO reaches exactly zero."}
      C: {prose: "$q_\\phi(z|x) \\approx p(z)$, so the latent code carries almost no information about $x$."}
      D: {prose: "$q_\\phi(z|x)$ becomes highly multimodal."}
    correct: C
    source: "adapted:Quiz4.Q8"

  - id: vae_bernoulli_decoder_01
    topic: vae
    subtopic: decoder_likelihood
    difficulty: moderate
    title: "Bernoulli Decoder Reconstruction"
    body: |
      In a VAE with a Bernoulli decoder used on binary-valued data, the reconstruction
      term $\mathbb{E}_{q_\phi(z|x)}[\log p_\theta(x|z)]$ is equivalent to:
    options:
      A: {prose: "Binary cross-entropy (up to sign)."}
      B: {prose: "Mean squared error."}
      C: {prose: "Wasserstein loss."}
      D: {prose: "Hinge loss."}
    correct: A
    source: "adapted:Quiz4.Q12"

  - id: vae_elbo_gap_01
    topic: vae
    subtopic: elbo
    difficulty: hard
    title: "ELBO Gap Identity"
    body: |
      For a VAE with encoder $q_\phi(z|x)$ and decoder $p_\theta(x|z)$, let
      $\mathcal{L}(x)$ denote the evidence lower bound. The ELBO gap
      \[
        \log p_\theta(x) - \mathcal{L}(x)
      \]
      equals which of the following?
    options:
      A: {math: "D_{KL}\\bigl(p(z) \\,\\|\\, q_\\phi(z|x)\\bigr)"}
      B: {math: "D_{KL}\\bigl(p_\\theta(z|x) \\,\\|\\, q_\\phi(z|x)\\bigr)"}
      C: {math: "D_{KL}\\bigl(q_\\phi(z|x) \\,\\|\\, p_\\theta(z|x)\\bigr)"}
      D: {math: "\\mathbb{E}_{p(z)}[\\log p_\\theta(x|z)]"}
    correct: C
    source: "adapted:Quiz4.Q4"

  - id: vae_beta_vae_01
    topic: vae
    subtopic: beta_vae
    difficulty: hard
    title: "Effect of Large Beta in beta-VAE"
    body: |
      In $\beta$-VAE the objective is
      $\mathcal{L}_\beta
       = \mathbb{E}_{q_\phi(z|x)}[\log p_\theta(x|z)] - \beta\,D_{KL}(q_\phi(z|x) \,\|\, p(z))$.
      For $\beta > 1$ the most likely effect is:
    options:
      A: {prose: "Exact maximum-likelihood training."}
      B: {prose: "Better reconstruction quality and weaker latent regularization."}
      C: {prose: "Stronger latent compression, often encouraging disentangled representations."}
      D: {prose: "Removal of the need for sampling from the posterior."}
    correct: C
    source: "adapted:Quiz4.Q7"

  - id: vae_kl_compute_01
    topic: vae
    subtopic: kl_divergence
    difficulty: hard
    title: "Numerical KL for Diagonal Gaussian"
    body: |
      Let $q_\phi(z|x) = \mathcal{N}\!\bigl(\mu, \mathrm{diag}(\sigma^2)\bigr)$ with
      $\mu = (1,\ -1)$ and $\log \sigma^2 = (\ln 4,\ \ln 0.25)$. The prior is
      $p(z) = \mathcal{N}(0, I)$. The KL divergence $D_{KL}(q_\phi \,\|\, p)$ is
      approximately:
    options:
      A: {math: "1.31"}
      B: {math: "2.13"}
      C: {math: "2.77"}
      D: {math: "3.02"}
    correct: B
    source: "adapted:Tutorials.Q14"
    notes: "Dim 1: 0.5(1+4-1.386-1)=1.307. Dim 2: 0.5(1+0.25+1.386-1)=0.818. Total ≈ 2.13."

  # ==================================================================
  #                       RNN / LSTM / GRU (6)
  # ==================================================================

  - id: rnn_gru_vs_lstm_01
    topic: rnn
    subtopic: gate_architecture
    difficulty: easy
    title: "GRU vs LSTM Structure"
    body: |
      Compared to an LSTM with the same input and hidden dimensions, a GRU typically
      has:
    options:
      A: {prose: "More parameters and more gates."}
      B: {prose: "Fewer parameters and fewer gates (no separate cell state)."}
      C: {prose: "Identical parameter count and gate structure."}
      D: {prose: "More parameters but fewer gates."}
    correct: B
    source: authored

  - id: rnn_gradient_vanishing_01
    topic: rnn
    subtopic: gradient_flow
    difficulty: moderate
    title: "Vanishing Gradients in RNNs"
    body: |
      Consider the scalar RNN $h_t = \tanh(a h_{t-1} + b x_t)$. The backprop factor
      $\partial h_t / \partial h_{t-1} = a\,(1 - h_t^2)$. Which condition leads to
      \emph{vanishing} gradients across many time steps?
    options:
      A: {math: "|a\\,(1 - h_k^2)| > 1 \\text{ consistently}"}
      B: {math: "|a\\,(1 - h_k^2)| < 1 \\text{ consistently}"}
      C: {math: "a = 0"}
      D: {math: "h_k \\in \\{-1, 1\\}"}
    correct: B
    source: "adapted:Tutorials.Q5"

  - id: rnn_lstm_cell_update_01
    topic: rnn
    subtopic: lstm_cell
    difficulty: moderate
    title: "LSTM Cell-State Update"
    body: |
      At time $t$, a scalar LSTM has gates $f_t = 0.8$, $i_t = 0.3$, candidate
      $\tilde c_t = 0.5$, and previous cell state $c_{t-1} = 1.2$. The new cell
      state $c_t = f_t c_{t-1} + i_t \tilde c_t$ is:
    options:
      A: {math: "0.96"}
      B: {math: "1.11"}
      C: {math: "1.26"}
      D: {math: "0.15"}
    correct: B
    source: "adapted:Tutorials.Q6"
    notes: "0.8*1.2 + 0.3*0.5 = 1.11."

  - id: rnn_gru_param_count_01
    topic: rnn
    subtopic: parameter_count
    difficulty: moderate
    title: "GRU Parameter Count"
    body: |
      A GRU has input dimension $d_x = 20$ and hidden dimension $d_h = 50$.
      Counting biases, how many trainable parameters does it have?
    options:
      A: {math: "10{,}500"}
      B: {math: "10{,}650"}
      C: {math: "14{,}200"}
      D: {math: "3{,}550"}
    correct: B
    source: "adapted:Tutorials.Q7"
    notes: "3 gates × (50*(20+50) + 50) = 3 * 3550 = 10650."

  - id: rnn_lstm_cell_gradient_01
    topic: rnn
    subtopic: gradient_flow
    difficulty: hard
    title: "LSTM Cell-State Jacobian"
    body: |
      For an LSTM cell with update $c_t = f_t c_{t-1} + i_t \tilde c_t$, the
      derivative $\partial c_t / \partial c_{t-1}$ (treating gates as inputs) equals
      approximately:
    options:
      A: {math: "f_t"}
      B: {math: "\\tanh'(c_t)"}
      C: {math: "i_t"}
      D: {math: "f_t \\cdot i_t"}
    correct: A
    source: authored

  - id: rnn_exposure_bias_01
    topic: rnn
    subtopic: training_dynamics
    difficulty: hard
    title: "Exposure Bias"
    body: |
      A sequence model trained with teacher forcing uses the ground-truth previous
      token as input at each step. Exposure bias refers to:
    options:
      A: {prose: "The mismatch between training (sees ground-truth prefix) and inference (sees its own imperfect predictions), leading to compounding errors at test time."}
      B: {prose: "Overfitting to the first few training examples."}
      C: {prose: "Systematic bias toward the most frequent token in the vocabulary."}
      D: {prose: "Gradients vanishing through the embedding matrix."}
    correct: A
    source: "adapted:Tutorials.Q8"

  # ==================================================================
  #                        AUTOENCODERS (4)
  # ==================================================================

  - id: ae_linear_pca_01
    topic: autoencoder
    subtopic: pca_connection
    difficulty: moderate
    title: "Linear Autoencoder = PCA"
    body: |
      A linear undercomplete autoencoder with tied weights,
      $h = W^\top x$, $\hat x = W h$, is trained on zero-mean data with squared-error
      reconstruction loss. The optimal $W$ spans:
    options:
      A: {prose: "A random subspace of the input space."}
      B: {prose: "The top-$k$ principal-component subspace of the data covariance."}
      C: {prose: "The null space of the data covariance."}
      D: {prose: "A subspace orthogonal to the data."}
    correct: B
    source: "adapted:Tutorials.Q17"

  - id: ae_denoising_01
    topic: autoencoder
    subtopic: denoising
    difficulty: moderate
    title: "Denoising Autoencoder"
    body: |
      A denoising autoencoder trains the network to reconstruct a clean $x$ from a
      corrupted observation $\tilde x = x + \varepsilon$. Compared to a standard
      autoencoder, this regularization:
    options:
      A: {prose: "Minimizes reconstruction error only on noise-free inputs."}
      B: {prose: "Forces the network to learn representations that recover the underlying signal, encouraging robustness."}
      C: {prose: "Is equivalent to a standard autoencoder with more hidden units."}
      D: {prose: "Cannot be trained with backpropagation."}
    correct: B
    source: "adapted:Tutorials.Q20"

  - id: ae_sparse_penalty_01
    topic: autoencoder
    subtopic: sparse
    difficulty: moderate
    title: "Sparse Autoencoder Target"
    body: |
      A sparse autoencoder adds
      $\Omega_{\mathrm{sparse}} = \lambda \sum_{j} \mathrm{KL}(\rho \,\|\, \hat\rho_j)$,
      where $\rho$ is a target activation rate and $\hat\rho_j$ is the empirical mean
      activation of hidden unit $j$. This encourages:
    options:
      A: {prose: "Every hidden unit to be active on every input."}
      B: {prose: "Each hidden unit to be active on roughly a fraction $\\rho$ of inputs, enforcing feature selectivity."}
      C: {prose: "All hidden units to share identical activations."}
      D: {prose: "The network to ignore the input entirely."}
    correct: B
    source: "adapted:Tutorials.Q18"

  - id: ae_contractive_01
    topic: autoencoder
    subtopic: contractive
    difficulty: hard
    title: "Contractive Autoencoder"
    body: |
      A contractive autoencoder adds
      $\Omega_{\mathrm{contr}} = \lambda \,\|J_h(x)\|_F^2$
      where $J_h$ is the Jacobian of the hidden representation w.r.t. the input.
      Its purpose is to:
    options:
      A: {prose: "Make the hidden representation locally insensitive to small perturbations of the input."}
      B: {prose: "Maximize the entropy of the hidden representation."}
      C: {prose: "Enforce orthogonality between hidden units."}
      D: {prose: "Speed up training by reducing the effective learning rate."}
    correct: A
    source: "adapted:Tutorials.Q19"

  # ==================================================================
  #                         MISC (4)
  # ==================================================================

  - id: mlp_pytorch_01
    topic: misc
    subtopic: pytorch_mapping
    difficulty: moderate
    title: "MLP -> PyTorch Mapping"
    body: |
      A neural network is defined as:
      \[
        h_1 = \mathrm{ReLU}(W_1 x + b_1), \qquad
        h_2 = \mathrm{ReLU}(W_2 h_1 + b_2), \qquad
        y = W_3 h_2 + b_3
      \]
      Which PyTorch implementation is correct?
    options:
      A:
        code: |
          nn.Sequential(
              nn.Linear(in_dim, h1),
              nn.ReLU(),
              nn.Linear(h1, h2),
              nn.ReLU(),
              nn.Linear(h2, out_dim)
          )
      B:
        code: |
          nn.Sequential(
              nn.Linear(in_dim, h1),
              nn.Linear(h1, h2),
              nn.Linear(h2, out_dim)
          )
      C:
        code: |
          nn.Sequential(
              nn.ReLU(),
              nn.Linear(in_dim, h1),
              nn.ReLU(),
              nn.Linear(h1, out_dim)
          )
      D:
        code: |
          nn.Sequential(
              nn.Linear(in_dim, h1),
              nn.Sigmoid(),
              nn.Linear(h1, out_dim)
          )
    correct: A
    source: "mirror:sample_image_1"

  - id: dropout_inverted_01
    topic: misc
    subtopic: dropout
    difficulty: easy
    title: "Inverted Dropout"
    body: |
      In \emph{inverted} dropout with keep probability $q$, activations are scaled by
      $1/q$ during training. Why?
    options:
      A: {prose: "So that no rescaling is needed at test time."}
      B: {prose: "To increase the effective learning rate."}
      C: {prose: "To ensure gradients through dropped units are nonzero."}
      D: {prose: "To prevent mode collapse."}
    correct: A
    source: "adapted:Tutorials.Q30"

  - id: bn_train_eval_01
    topic: misc
    subtopic: batch_norm
    difficulty: moderate
    title: "Batch Norm Train vs Eval"
    body: |
      Batch normalization behaves differently in training vs evaluation mode because:
    options:
      A: {prose: "It uses different learning rates in each mode."}
      B: {prose: "Training uses per-batch statistics; evaluation uses running-average statistics accumulated during training."}
      C: {prose: "Evaluation disables the affine $\\gamma,\\beta$ parameters."}
      D: {prose: "Training simultaneously applies dropout while evaluation does not."}
    correct: B
    source: authored

  - id: init_he_vs_xavier_01
    topic: misc
    subtopic: initialization
    difficulty: hard
    title: "He vs Xavier Initialization"
    body: |
      He initialization (variance $2/\mathrm{fan\_in}$) is preferred over Xavier
      initialization (variance $1/\mathrm{fan\_in}$) for which activation, and why?
    options:
      A: {prose: "$\\tanh$, because it matches its output range."}
      B: {prose: "ReLU, because roughly half the activations are zero, so the variance must be doubled to maintain forward-signal magnitude."}
      C: {prose: "Sigmoid, because its derivative is small."}
      D: {prose: "Linear activations only."}
    correct: B
    source: "adapted:Quiz2.Q3"
