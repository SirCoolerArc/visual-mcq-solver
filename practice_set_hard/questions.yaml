# GNR 638 — Harder practice MCQ bank (26 questions)
#
# Companion to practice_set/questions.yaml. These questions are intentionally
# harder than v1: more multi-step computation, subtler distractors, broader
# format diversity (numerical, conceptual, code-spotting, scenario-based).
# Schema is identical to v1.
#
# Allocation: 5 CNN | 5 Loss/Opt | 4 GAN | 4 VAE | 3 RNN | 2 AE | 3 Misc (26 total)
# Answer distribution (intentionally balanced): A=5, B=8, C=7, D=6.

questions:

  # ==================================================================
  #                              CNN (5)
  # ==================================================================

  - id: cnn_dilation_rf_advanced
    topic: cnn
    subtopic: receptive_field
    difficulty: hard
    title: "Stacked Dilated Convolution Receptive Field"
    body: |
      Three consecutive 1D convolution layers each with kernel size $k = 3$,
      stride 1, and dilation rates $d_1 = 1$, $d_2 = 2$, $d_3 = 4$ are applied
      in sequence. What is the receptive field of one output activation with
      respect to the input?
    options:
      A: {math: "7"}
      B: {math: "9"}
      C: {math: "13"}
      D: {math: "15"}
    correct: D
    source: authored
    notes: |
      RF_l = RF_{l-1} + (k_eff_l - 1) * J_{l-1}, k_eff = (k-1)*d + 1, J=1 (stride 1).
      L1: RF = 1 + 2 = 3.  L2: 3 + 4 = 7.  L3: 7 + 8 = 15.

  - id: cnn_dsc_param_ratio
    topic: cnn
    subtopic: parameter_count
    difficulty: hard
    title: "Depthwise-Separable vs Standard Conv Compression"
    body: |
      A depthwise-separable convolution replaces a standard $3 \times 3$ convolution
      with $C_{\text{in}} = 32$ input channels and $C_{\text{out}} = 64$ output
      channels (no bias). Approximately by what factor does the parameter count decrease?
    options:
      A: {math: "\\sim 2 \\times"}
      B: {math: "\\sim 4 \\times"}
      C: {math: "\\sim 8 \\times"}
      D: {math: "\\sim 16 \\times"}
    correct: C
    source: authored
    notes: |
      Standard: 3*3*32*64 = 18432.
      DS: depthwise 3*3*32 = 288, pointwise 1*1*32*64 = 2048; total 2336.
      18432 / 2336 ≈ 7.89, ~8x.

  - id: cnn_transposed_conv_advanced
    topic: cnn
    subtopic: shape_propagation
    difficulty: hard
    title: "Transposed Convolution with Output Padding"
    body: |
      A transposed 2D convolution is applied to a $7 \times 7$ feature map with
      kernel size 3, stride 2, padding 1, and output padding 1. What is the
      output spatial size?
    options:
      A: {math: "12 \\times 12"}
      B: {math: "13 \\times 13"}
      C: {math: "14 \\times 14"}
      D: {math: "15 \\times 15"}
    correct: C
    source: authored
    notes: |
      out = (in-1)*stride - 2*padding + kernel + output_padding
          = (7-1)*2 - 2 + 3 + 1 = 12 - 2 + 3 + 1 = 14.

  - id: cnn_grouped_conv_params
    topic: cnn
    subtopic: parameter_count
    difficulty: hard
    title: "Grouped Convolution Parameter Count"
    body: |
      A grouped 2D convolution with $G = 4$ groups, kernel size $3 \times 3$,
      $C_{\text{in}} = 64$, and $C_{\text{out}} = 128$ (no bias). How many
      trainable parameters does the layer have?
    options:
      A: {math: "73{,}728"}
      B: {math: "294{,}912"}
      C: {math: "9{,}216"}
      D: {math: "18{,}432"}
    correct: D
    source: authored
    notes: |
      Each group: 3*3*(64/4)*(128/4) = 9 * 16 * 32 = 4608.
      Total: 4 * 4608 = 18432.
      A = ungrouped count (3*3*64*128); B = quadruple of A (common confusion).

  - id: cnn_residual_block_code
    topic: cnn
    subtopic: code_understanding
    difficulty: hard
    title: "Correct Basic Residual Block in PyTorch"
    body: |
      Which PyTorch snippet correctly implements a basic ResNet residual block
      with two $3\times3$ convolutions, BatchNorm, and an identity skip
      connection (assume input and output channels are equal, no downsampling)?
    options:
      A:
        code: |
          out = self.conv1(x)
          out = self.bn1(out)
          out = self.relu(out)
          out = self.conv2(out)
          out = self.bn2(out)
          out = out + x
          return self.relu(out)
      B:
        code: |
          out = self.conv1(x)
          out = self.relu(out)
          out = self.conv2(out)
          out = out + x
          return self.relu(out)
      C:
        code: |
          out = self.conv1(x)
          out = self.bn1(out)
          out = self.conv2(out)
          out = self.bn2(out)
          out = self.relu(out + x)
          return out
      D:
        code: |
          out = self.relu(x)
          out = self.conv1(out)
          out = self.bn1(out)
          out = self.conv2(out)
          out = self.bn2(out)
          return out + x
    correct: A
    source: authored
    notes: |
      A is the canonical post-activation basic block (He et al. 2015).
      B drops BatchNorm. C drops the activation between the two convs (residual
      function becomes linear). D is a malformed pre-activation variant missing
      the final ReLU after the skip.

  # ==================================================================
  #                         Loss + Optimization (5)
  # ==================================================================

  - id: loss_poisson_nll
    topic: loss_opt
    subtopic: poisson_regression
    difficulty: hard
    title: "Poisson Regression NLL"
    body: |
      For Poisson regression with rate parameter $\lambda_i = \exp(w^\top x_i)$,
      the per-sample negative log-likelihood (ignoring constants independent
      of $w$) is:
    options:
      A: {math: "-y_i \\log(w^\\top x_i)"}
      B: {math: "y_i (w^\\top x_i) - \\exp(w^\\top x_i)"}
      C: {math: "-y_i (w^\\top x_i) + \\exp(w^\\top x_i)"}
      D: {math: "(y_i - w^\\top x_i)^2"}
    correct: C
    source: "adapted:Quiz2.Q7"
    notes: |
      P(y|λ) = λ^y e^{-λ} / y!
      log P = y log λ - λ - log(y!) = y(w·x) - exp(w·x) - log(y!)
      NLL (drop const) = -y(w·x) + exp(w·x).

  - id: loss_grad_stability_singular
    topic: loss_opt
    subtopic: gradient_flow
    difficulty: hard
    title: "Gradient Stability via Singular Values"
    body: |
      Backprop through a linear layer satisfies $\delta_{\ell-1} = W_\ell^\top \delta_\ell$.
      A simple sufficient condition on the largest singular value $s_{\max}(W_\ell)$
      that prevents exploding gradients across many layers is:
    options:
      A: {math: "s_{\\max}(W_\\ell) > 1"}
      B: {math: "s_{\\max}(W_\\ell) \\le 1"}
      C: {math: "s_{\\min}(W_\\ell) > 1"}
      D: {math: "\\det(W_\\ell) = 1"}
    correct: B
    source: "adapted:Quiz2.Q5"
    notes: |
      ||δ_{l-1}||_2 ≤ s_max(W^T) * ||δ_l||_2 = s_max(W) * ||δ_l||_2.
      Iterating: ||δ_0|| ≤ s_max^L * ||δ_L||. Bounded only if s_max ≤ 1.

  - id: loss_adamw_decoupling
    topic: loss_opt
    subtopic: weight_decay
    difficulty: hard
    title: "AdamW Decoupled Weight Decay"
    body: |
      In AdamW, the key difference from Adam-with-L2 regularization is that the
      weight-decay term:
    options:
      A: {prose: "is added to the gradient before the adaptive learning rate normalization, exactly like vanilla L2 in Adam."}
      B: {prose: "is applied directly to the parameters, decoupled from the gradient and the adaptive denominator."}
      C: {prose: "is doubled to compensate for momentum bias."}
      D: {prose: "is applied only to bias parameters, not weights."}
    correct: B
    source: "adapted:Tutorials.Q25"
    notes: |
      AdamW: w ← w - lr * (m_hat / (sqrt(v_hat) + eps) + λ * w).
      L2-in-Adam couples decay through the adaptive denominator, which makes the
      effective regularization strength parameter-dependent.

  - id: loss_focal_modulation
    topic: loss_opt
    subtopic: focal_loss
    difficulty: hard
    title: "Focal Loss Modulating Factor"
    body: |
      The binary focal loss is $\mathrm{FL}(p_t) = -(1 - p_t)^\gamma \log(p_t)$
      where $p_t$ is the model's probability for the true class. The factor
      $(1 - p_t)^\gamma$ with $\gamma > 0$:
    options:
      A: {prose: "increases the loss contribution from well-classified examples ($p_t \\to 1$)."}
      B: {prose: "is equivalent to label smoothing with smoothing parameter $\\gamma$."}
      C: {prose: "guarantees convergence in convex problems regardless of class imbalance."}
      D: {prose: "down-weights well-classified examples and focuses gradient on hard examples."}
    correct: D
    source: authored
    notes: |
      As p_t → 1, (1-p_t)^γ → 0, so easy examples contribute almost zero loss.
      Hard examples (small p_t) keep their full -log(p_t) magnitude.

  - id: loss_label_smoothing_logits
    topic: loss_opt
    subtopic: label_smoothing
    difficulty: hard
    title: "Label Smoothing Effect on Logits"
    body: |
      Label smoothing replaces the one-hot target $\mathbf{e}_y$ with
      $(1 - \varepsilon)\mathbf{e}_y + \frac{\varepsilon}{K-1}(\mathbf{1} - \mathbf{e}_y)$
      for $K$ classes. Compared to standard cross-entropy, the trained model's
      logits typically:
    options:
      A: {prose: "have a larger gap between correct and incorrect class scores."}
      B: {prose: "have a smaller gap, leading to less overconfident predictions."}
      C: {prose: "are unchanged because the softmax cancels the smoothing."}
      D: {prose: "diverge to infinity at convergence."}
    correct: B
    source: "adapted:Tutorials.Q21"
    notes: |
      With smoothed targets the loss can't be driven to zero by pushing the
      correct logit arbitrarily high. The optimum is at finite logit gap →
      better calibration, lower confidence.

  # ==================================================================
  #                              GAN (4)
  # ==================================================================

  - id: gan_wgan_gp_motivation
    topic: gan
    subtopic: wgan_gp
    difficulty: hard
    title: "WGAN-GP Gradient Penalty Target"
    body: |
      WGAN-GP enforces the 1-Lipschitz constraint on the critic via the
      gradient penalty $(\|\nabla_{\hat x} D(\hat x)\|_2 - 1)^2$ on points
      $\hat x$ sampled along straight lines between real and generated points.
      Why is the penalty centered at 1 rather than at 0?
    options:
      A: {prose: "Centering at 0 would force a constant critic, providing zero gradient signal to the generator."}
      B: {prose: "Centering at 1 enforces the 1-Lipschitz upper bound; on the interpolated set the optimal critic actually has unit gradient norm almost everywhere."}
      C: {prose: "The choice is arbitrary; both targets give equivalent training dynamics."}
      D: {prose: "Centering at 1 corresponds to KL divergence minimization."}
    correct: B
    source: "adapted:Tutorials.Q12"
    notes: |
      For the optimal critic in the Kantorovich-Rubinstein dual, ||∇D|| = 1
      a.e. on the support of the optimal coupling. Penalizing toward 1 nudges
      the learned critic toward this optimal property; toward 0 collapses D.

  - id: gan_spectral_norm
    topic: gan
    subtopic: spectral_normalization
    difficulty: hard
    title: "Spectral Normalization Target"
    body: |
      Spectral normalization replaces a weight matrix $W$ in the discriminator
      with which of the following?
    options:
      A: {math: "W / s_{\\min}(W)"}
      B: {math: "W / \\det(W)"}
      C: {math: "W / \\|W\\|_F"}
      D: {math: "W / s_{\\max}(W)"}
    correct: D
    source: authored
    notes: |
      Dividing by s_max(W) makes the largest singular value of the normalized
      matrix equal to 1, so the linear layer is 1-Lipschitz. Composes with
      1-Lipschitz activations (ReLU) to keep the entire discriminator
      1-Lipschitz.

  - id: gan_minimax_vanishing_grad
    topic: gan
    subtopic: training_dynamics
    difficulty: hard
    title: "Minimax Generator Vanishing Gradient"
    body: |
      Early in training, the generator using the original GAN minimax loss
      $\log(1 - D(G(z)))$ suffers from vanishing gradients primarily because:
    options:
      A: {prose: "The discriminator easily separates real from fake, so $D(G(z)) \\approx 0$, where $\\log(1 - D(G(z)))$ has near-zero slope with respect to the generator's parameters after backpropagating through $D$."}
      B: {prose: "The generator's weights are too small in magnitude to produce gradients."}
      C: {prose: "Backpropagation through the latent sampling step breaks the gradient chain entirely."}
      D: {prose: "Real and generated samples have identical distributions early on, so the gradient is zero by symmetry."}
    correct: A
    source: authored
    notes: |
      d/dD log(1-D)|_{D≈0} = -1/(1-D) ≈ -1, but combined with discriminator
      saturation (sigmoid plateau) and chain through G, the effective gradient
      to G's parameters vanishes. Non-saturating loss -log(D(G(z))) fixes this.

  - id: gan_optimal_discriminator
    topic: gan
    subtopic: theory
    difficulty: hard
    title: "Optimal GAN Discriminator (Pointwise)"
    body: |
      For the standard GAN objective with a fixed generator, the optimal
      discriminator $D^*(x)$ at any point $x$ in the input space is:
    options:
      A: {math: "p_g(x) / p_{\\text{data}}(x)"}
      B: {math: "p_{\\text{data}}(x) / (p_{\\text{data}}(x) + p_g(x))"}
      C: {math: "p_g(x) / (p_{\\text{data}}(x) + p_g(x))"}
      D: {prose: "$1/2$ everywhere, since at the global GAN optimum the two distributions match."}
    correct: B
    source: "adapted:Quiz4.Q6"
    notes: |
      The pointwise objective f(D) = p_data*log(D) + p_g*log(1-D) is maximized
      at D = p_data/(p_data+p_g). At the GLOBAL optimum p_data = p_g and so
      D* = 1/2 there — but D = 1/2 is not the formula in general.

  # ==================================================================
  #                              VAE (4)
  # ==================================================================

  - id: vae_elbo_tightness
    topic: vae
    subtopic: elbo
    difficulty: hard
    title: "ELBO Tightness Condition"
    body: |
      For a VAE, the ELBO satisfies $\mathcal{L}(x) \le \log p_\theta(x)$.
      The bound is tight (equality) if and only if:
    options:
      A: {math: "q_\\phi(z|x) = p_\\theta(z|x) \\text{ exactly}"}
      B: {math: "q_\\phi(z|x) = p(z) \\text{ (the prior)}"}
      C: {prose: "the encoder is a deterministic function of $x$."}
      D: {prose: "the KL term is dropped from the objective."}
    correct: A
    source: "adapted:Quiz4.Q15"
    notes: |
      log p(x) - L(x) = KL(q_φ(z|x) || p_θ(z|x)). Gap is zero iff this KL is
      zero, iff variational posterior matches the true posterior.

  - id: vae_reverse_kl_behavior
    topic: vae
    subtopic: kl_divergence
    difficulty: hard
    title: "VAE Reverse KL Mode Behavior"
    body: |
      The VAE training objective minimizes $\mathrm{KL}(q_\phi(z|x) \,\|\, p(z))$
      (reverse KL, with $q$ as the first argument). Compared to forward
      KL $\mathrm{KL}(p \,\|\, q)$, this tends to make the learned $q$:
    options:
      A: {prose: "mass-covering: $q$ spreads probability over all modes of $p$, even if some mass falls on low-density regions."}
      B: {prose: "mode-seeking: $q$ tends to concentrate on a single mode of $p$, undercovering multimodal structure."}
      C: {prose: "irrelevant: forward and reverse KL produce identical $q$."}
      D: {prose: "deterministic: reverse KL forces $q$ to be a delta function."}
    correct: B
    source: authored
    notes: |
      KL(q || p) = ∫ q log(q/p). Penalizes q having mass where p is small, so
      q avoids low-density regions → mode-seeking. Forward KL does the opposite
      (mass-covering, mean-seeking).

  - id: vae_beta_vae_disentangle
    topic: vae
    subtopic: beta_vae
    difficulty: hard
    title: "β-VAE with Large β"
    body: |
      In a β-VAE with $\beta \gg 1$, increasing $\beta$ tends to:
    options:
      A: {prose: "improve reconstruction quality at the expense of latent regularization."}
      B: {prose: "give exact maximum-likelihood training, equivalent to standard autoencoders."}
      C: {prose: "encourage latent disentanglement at the expense of reconstruction quality."}
      D: {prose: "remove the need for a probabilistic encoder."}
    correct: C
    source: "adapted:Quiz4.Q7"
    notes: |
      β scales the KL term, pushing q closer to the factorized prior p(z).
      A more factorized posterior often correlates with disentangled latent
      factors. Trade-off: stronger compression → less info for decoder →
      lossier reconstruction.

  - id: vae_cvae_kl
    topic: vae
    subtopic: conditional_vae
    difficulty: hard
    title: "Conditional VAE KL Term"
    body: |
      In a Conditional VAE that generates $x$ given a condition $c$ (e.g.,
      class label), with encoder $q_\phi(z|x, c)$ and prior $p(z|c)$,
      the KL term in the ELBO is:
    options:
      A: {math: "\\mathrm{KL}(q_\\phi(z|x, c) \\,\\|\\, p(z|c))"}
      B: {math: "\\mathrm{KL}(q_\\phi(z|x) \\,\\|\\, p(z))"}
      C: {math: "\\mathrm{KL}(q_\\phi(z|x, c) \\,\\|\\, p(c))"}
      D: {prose: "There is no KL term in CVAE because the encoder already conditions on $c$."}
    correct: A
    source: authored
    notes: |
      CVAE conditions both encoder and prior on c.
      ELBO: log p(x|c) ≥ E_q[log p(x|z,c)] - KL(q(z|x,c) || p(z|c)).

  # ==================================================================
  #                              RNN (3)
  # ==================================================================

  - id: rnn_lstm_cell_multistep
    topic: rnn
    subtopic: lstm_cell
    difficulty: hard
    title: "LSTM Two-Step Cell-State Computation"
    body: |
      A scalar LSTM has $c_0 = 0$. At time 1: $f_1 = 0.5,\ i_1 = 0.6,\ \tilde c_1 = 1$.
      At time 2: $f_2 = 0.8,\ i_2 = 0.4,\ \tilde c_2 = 0.5$. Compute $c_2$
      using $c_t = f_t c_{t-1} + i_t \tilde c_t$.
    options:
      A: {math: "0.20"}
      B: {math: "0.74"}
      C: {math: "0.96"}
      D: {math: "0.68"}
    correct: D
    source: authored
    notes: |
      c_1 = 0.5*0 + 0.6*1 = 0.6.
      c_2 = 0.8*0.6 + 0.4*0.5 = 0.48 + 0.20 = 0.68.

  - id: rnn_truncated_bptt_bias
    topic: rnn
    subtopic: training_dynamics
    difficulty: hard
    title: "Truncated BPTT Gradient Bias"
    body: |
      Truncated backpropagation through time, where gradients are propagated
      only $k$ steps back, results in:
    options:
      A: {prose: "an unbiased gradient estimator with reduced variance."}
      B: {prose: "a biased gradient estimator that ignores dependencies older than $k$ steps."}
      C: {prose: "the exact full gradient as long as $k \\ge 1$."}
      D: {prose: "increased memory usage compared to full BPTT."}
    correct: B
    source: authored
    notes: |
      Cutting the chain at k steps drops contributions from earlier states.
      For dependencies longer than k, the truncated gradient is biased
      (specifically, it underestimates the contribution of long-range terms).

  - id: rnn_attention_complexity
    topic: rnn
    subtopic: attention
    difficulty: hard
    title: "Self-Attention Time Complexity"
    body: |
      Standard scaled dot-product self-attention over a sequence of length $T$
      with model dimension $d$ has time complexity (per layer, ignoring the
      $Q$/$K$/$V$ projections):
    options:
      A: {math: "O(T \\cdot d)"}
      B: {math: "O(T \\log T)"}
      C: {math: "O(T^2 \\cdot d)"}
      D: {math: "O(T \\cdot d^2)"}
    correct: C
    source: authored
    notes: |
      Computing QK^T (T×d times d×T): O(T²·d). The softmax is O(T²) and the
      attention-weighted sum is another O(T²·d). For T >> d, T²·d dominates.

  # ==================================================================
  #                          Autoencoder (2)
  # ==================================================================

  - id: ae_sparse_kl_limit
    topic: autoencoder
    subtopic: sparse
    difficulty: hard
    title: "Sparse-AE KL Penalty Limit"
    body: |
      The sparse-autoencoder penalty per hidden unit is
      $\mathrm{KL}(\rho \,\|\, \hat\rho_j)$ with target activation rate
      $\rho$ small (e.g., $0.05$). What happens to this term as the empirical
      mean activation $\hat\rho_j \to 1$?
    options:
      A: {math: "\\to 0"}
      B: {math: "\\to 1"}
      C: {math: "\\to +\\infty"}
      D: {prose: "stays bounded by $\\log 2$."}
    correct: C
    source: authored
    notes: |
      KL(ρ || ρ̂) = ρ log(ρ/ρ̂) + (1-ρ) log((1-ρ)/(1-ρ̂)).
      As ρ̂ → 1: log((1-ρ)/(1-ρ̂)) → +∞ (denominator → 0+),
      multiplied by (1-ρ) > 0 → +∞.

  - id: ae_contractive_jacobian
    topic: autoencoder
    subtopic: contractive
    difficulty: hard
    title: "Contractive AE Jacobian Penalty"
    body: |
      The contractive autoencoder adds the regularizer $\|J_e(x)\|_F^2$,
      the squared Frobenius norm of the encoder's Jacobian with respect to
      the input. This penalizes:
    options:
      A: {prose: "encoder representations being too sensitive to small input perturbations."}
      B: {prose: "decoder weights being large in magnitude."}
      C: {prose: "the latent code being correlated across dimensions."}
      D: {prose: "reconstructions deviating from the identity function."}
    correct: A
    source: "adapted:Tutorials.Q19"
    notes: |
      ||J_e||_F^2 = sum of squared partial derivatives of each latent dim wrt
      each input dim. Small ||J|| means the encoding changes slowly with x —
      i.e., robust to local input perturbations.

  # ==================================================================
  #                              Misc (3)
  # ==================================================================

  - id: misc_dropblock_gamma
    topic: misc
    subtopic: dropblock
    difficulty: hard
    title: "DropBlock Block-Center Probability"
    body: |
      DropBlock drops $b \times b$ contiguous regions of an $H \times W$
      feature map. To achieve an expected total drop fraction of $\rho$
      (assuming non-overlapping blocks and ignoring boundary effects), the
      probability $\gamma$ of selecting any pixel as a block-center is
      approximately:
    options:
      A: {math: "\\gamma \\approx \\rho"}
      B: {math: "\\gamma \\approx \\rho \\cdot b^2"}
      C: {math: "\\gamma \\approx \\rho / b^2"}
      D: {math: "\\gamma \\approx \\rho \\cdot HW"}
    correct: C
    source: "adapted:Quiz2.Q2"
    notes: |
      Each chosen block drops b² pixels. To drop ρ*HW pixels total need
      ρ*HW/b² blocks out of ~HW candidate centers. So γ ≈ ρ/b².

  - id: misc_bn_running_momentum
    topic: misc
    subtopic: batch_norm
    difficulty: hard
    title: "BatchNorm Running-Statistics Momentum"
    body: |
      BatchNorm maintains running estimates of $\mu$ and $\sigma^2$ via
      $\mu_{\text{run}} \leftarrow (1 - \alpha) \mu_{\text{run}} + \alpha \mu_{\text{batch}}$.
      Setting $\alpha = 1$ (instead of a small value like $0.1$) would:
    options:
      A: {prose: "make the running estimate adapt more smoothly across batches."}
      B: {prose: "have no effect; only the affine $\\gamma, \\beta$ matter at evaluation."}
      C: {prose: "cause an error because $\\alpha$ must be strictly less than 1."}
      D: {prose: "make $\\mu_{\\text{run}}$ at evaluation equal to whichever single batch was seen most recently in training, ignoring all earlier history."}
    correct: D
    source: authored
    notes: |
      With α=1, μ_run ← μ_batch every step. Pure replacement, no exponential
      averaging. At eval time, you'd use only the very last training batch's
      mean — noisy and not representative of the dataset.

  - id: misc_transfer_small_data
    topic: misc
    subtopic: transfer_learning
    difficulty: hard
    title: "Transfer Learning with Few Labels"
    body: |
      You have a CNN backbone pre-trained on a large dataset (ImageNet). The
      target task has only 100 labeled samples. Among the following, the most
      reliable strategy is typically:
    options:
      A: {prose: "train the entire network from scratch on the 100 samples."}
      B: {prose: "freeze the pre-trained backbone and train only a small new classification head."}
      C: {prose: "fine-tune all layers of the backbone with a high learning rate."}
      D: {prose: "discard the pre-trained weights, since they were trained on a different domain."}
    correct: B
    source: "adapted:Quiz2.Q8"
    notes: |
      With 100 samples, fine-tuning the whole backbone risks severe overfitting.
      Frozen-backbone-with-head reuses pre-trained features and only fits the
      small head, which has far fewer free parameters and is robust to small
      data.
